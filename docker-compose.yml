services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"

  api:
    build: .
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: student_feedback
      STUDENT_VOICE_PROJECT_DIR: /app
      HF_HOME: /root/.cache/huggingface
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      RAG_TOP_K: ${RAG_TOP_K:-6}
      RERANK_TOP_N: ${RERANK_TOP_N:-40}
    volumes:
      - ./outputs/models:/app/outputs/models:ro
      - ./data/processed:/app/data/processed:ro
      - ./outputs/hf_cache:/root/.cache/huggingface
      - ./outputs/app_state:/app/outputs/app_state
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  dashboard:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    ports:
      - "8501:3000"
    depends_on:
      - api

  gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx/cloudflare-tunnel.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - dashboard
      - api

  streamlit:
    build: .
    command: streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      STUDENT_VOICE_API_URL: http://api:8000
    ports:
      - "8502:8501"
    depends_on:
      - api

volumes:
  qdrant_storage:
